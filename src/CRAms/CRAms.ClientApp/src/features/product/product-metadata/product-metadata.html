@if (!!product()) {
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title>{{ product()!.name }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      @if (product()!.description) {
        <p>{{ product()!.description }}</p>
      }
    </mat-card-content>
  </mat-card>
} @else {
  <p>Product could not be loaded.</p>
}
